version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: '123'
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:123@postgres:5432/erp?schema=public
      PETPOOJA_APP_KEY: rpvg7joamn421d3u0x5qhk9ze8sibtcw
      PETPOOJA_APP_SECRET: c7b1e4b80a2d1bfbf67da2bc81ca9dd9bf019b3e
      PETPOOJA_ACCESS_TOKEN: 7334c01be3a9677868cbf1402880340e79e1ea84
      PETPOOJA_MENU_SHARING_CODE: uvhn3bim
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend (Vite Dev Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
